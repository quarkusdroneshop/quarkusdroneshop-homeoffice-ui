rules:
  # XSS: dangerouslySetInnerHTML の未検証利用
  - id: react-dangerously-set-inner-html
    patterns:
      - pattern: dangerouslySetInnerHTML={{ __html: $X }}
      - pattern-not: dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize($X) }}
    message: "dangerouslySetInnerHTML はサニタイズなしで使用しないこと (XSS リスク)"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security
      owasp: A03:2021

  # eval の使用禁止
  - id: no-eval
    pattern: eval($X)
    message: "eval() は任意コード実行のリスクがあります"
    languages: [typescript, javascript]
    severity: ERROR
    metadata:
      category: security

  # ハードコードされたシークレット（簡易）
  - id: hardcoded-secret-assignment
    pattern: |
      const $KEY = "$VALUE"
    metavariable-regex:
      metavariable: $KEY
      regex: '(?i)(password|secret|token|api_?key|auth)'
    metavariable-regex:
      metavariable: $VALUE
      regex: '.{8,}'
    message: "ハードコードされたシークレットの疑い: $KEY"
    languages: [typescript, javascript]
    severity: WARNING
    metadata:
      category: security
      owasp: A02:2021

  # console.log の本番コードへの混入
  - id: no-console-log-in-production
    pattern: console.log(...)
    message: "console.log は本番コードに残さないこと"
    languages: [typescript, javascript]
    severity: INFO
    paths:
      include:
        - src/
      exclude:
        - src/**/*.test.*
        - src/**/*.spec.*
