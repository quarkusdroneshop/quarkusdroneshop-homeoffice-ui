apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-and-push-quarkusdroneshop-homeoffice-ui
  namespace: quarkusdroneshop-cicd
  labels:
    app.kubernetes.io/name: quarkusdroneshop-homeoffice-ui
    tekton.dev/pipeline: build-and-push-quarkusdroneshop-homeoffice-ui
spec:
  params:
    - name: git-url
      type: string
      description: ソースリポジトリ URL
      default: https://github.com/quarkusdroneshop/quarkusdroneshop-homeoffice-ui.git
    - name: git-revision
      type: string
      description: ブランチ / タグ / コミット SHA
      default: main
    - name: image-name
      type: string
      description: プッシュ先イメージ名（レジストリ込み）
      default: quay.io/quarkusdroneshop/quarkusdroneshop-homeoffice-ui
    - name: image-tag
      type: string
      description: イメージタグ
      default: latest
    - name: base-url
      type: string
      description: DAST スキャン対象 URL（デプロイ後のベース URL）
      default: http://homeoffice-ui.quarkusdroneshop.svc.cluster.local:8080

  workspaces:
    - name: source
      description: ソースチェックアウト用 PVC
    - name: npm-cache
      description: npm キャッシュ用 PVC（任意）
      optional: true

  tasks:
    # ─────────────────────────────────────────────
    # 1. ソースチェックアウト
    # ─────────────────────────────────────────────
    - name: git-clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
        - name: deleteExisting
          value: "true"

    # ─────────────────────────────────────────────
    # 2. npm install
    # ─────────────────────────────────────────────
    - name: npm-install
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: npm-install-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: install
                    image: registry.access.redhat.com/ubi9/nodejs-22:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      mkdir -p test-results
                      npm ci --legacy-peer-deps
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 3. 型チェック & Lint（JSON レポートも保存）
    # ─────────────────────────────────────────────
    - name: lint-and-typecheck
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: lint-typecheck-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: type-check
                    image: registry.access.redhat.com/ubi9/nodejs-22:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      npm run type-check
                  - name: lint-and-report
                    image: registry.access.redhat.com/ubi9/nodejs-22:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      mkdir -p test-results
                      # ESLint JSON レポートを出力（エラーがあっても続行）
                      npm run lint:json
                      # CI ではエラーを表示してステップ失敗させる
                      npm run lint
      runAfter: [npm-install]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 4. Jest ユニットテスト（JSON + カバレッジ）
    # ─────────────────────────────────────────────
    - name: unit-test
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: jest-test-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: test
                    image: registry.access.redhat.com/ubi9/nodejs-22:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      mkdir -p test-results
                      # JSON 出力 + カバレッジ（json-summary）を生成
                      npm run test:json -- --ci --forceExit
      runAfter: [npm-install]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 5. Semgrep 静的解析
    # ─────────────────────────────────────────────
    - name: semgrep-scan
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: semgrep-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: semgrep
                    image: returntocorp/semgrep:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      mkdir -p test-results
                      # JSON レポートを test-results/ へ保存（失敗しても続行）
                      semgrep --config=.semgrep.yml \
                              --config=p/react \
                              --config=p/typescript \
                              --config=p/owasp-top-ten \
                              --json \
                              --output test-results/semgrep-report.json \
                              src/ || true
                      # ステップとしてはエラー扱い（--error で終了コード 1 になる場合のみ失敗）
                      semgrep --config=.semgrep.yml \
                              --config=p/react \
                              --config=p/typescript \
                              --config=p/owasp-top-ten \
                              --error \
                              src/
      runAfter: [npm-install]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 6. Gitleaks シークレットスキャン
    # ─────────────────────────────────────────────
    - name: gitleaks-scan
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: gitleaks-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: gitleaks
                    image: zricethezav/gitleaks:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env sh
                      set -eu
                      mkdir -p test-results
                      gitleaks detect \
                        --source . \
                        --config .gitleaks.toml \
                        --report-format json \
                        --report-path test-results/gitleaks-report.json \
                        --no-git \
                        --verbose
      runAfter: [git-clone]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 7. Trivy SCA / 依存関係スキャン（fs モード）
    # ─────────────────────────────────────────────
    - name: trivy-scan
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: trivy-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: trivy-fs
                    image: aquasec/trivy:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env sh
                      set -eu
                      mkdir -p test-results
                      trivy fs \
                        --exit-code 1 \
                        --severity HIGH,CRITICAL \
                        --format json \
                        --output test-results/trivy-report.json \
                        --ignore-unfixed \
                        .
      runAfter: [npm-install]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 8. テスト結果レポート生成
    # ─────────────────────────────────────────────
    - name: generate-report
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: generate-report-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: report
                    image: registry.access.redhat.com/ubi9/python-311:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      python3 src/test/scripts/generate-report.py \
                        test-results quarkusdroneshop-homeoffice-ui
                      echo "=== Release Gate ==="
                      cat test-results/test-report/index.html \
                        | grep -o 'リリース[可不]能[^<]*' | head -5 || true
      runAfter: [unit-test, lint-and-typecheck, semgrep-scan, gitleaks-scan, trivy-scan]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 9. Webpack ビルド
    # ─────────────────────────────────────────────
    - name: build
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: webpack-build-inline
              spec:
                workspaces:
                  - name: source
                steps:
                  - name: build
                    image: registry.access.redhat.com/ubi9/nodejs-22:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    env:
                      - name: NODE_ENV
                        value: production
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      # dr:surge はスキップ（CI では不要）
                      npx webpack --config webpack.prod.js
      runAfter: [generate-report]
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 10. コンテナイメージビルド & プッシュ
    # ─────────────────────────────────────────────
    - name: build-image
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      runAfter: [build]
      params:
        - name: IMAGE
          value: $(params.image-name):$(params.image-tag)
        - name: DOCKERFILE
          value: ./Dockerfile
        - name: CONTEXT
          value: .
        - name: BUILD_EXTRA_ARGS
          value: "--label git-commit=$(tasks.git-clone.results.commit)"
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 11. Playwright E2E テスト（ステージング環境）
    # ─────────────────────────────────────────────
    - name: playwright-e2e
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: playwright-inline
              spec:
                params:
                  - name: base-url
                    type: string
                workspaces:
                  - name: source
                steps:
                  - name: e2e
                    image: mcr.microsoft.com/playwright:v1.49.1-noble
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: false
                      allowPrivilegeEscalation: false
                    env:
                      - name: BASE_URL
                        value: $(params.base-url)
                      - name: CI
                        value: "true"
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      npm ci --legacy-peer-deps
                      npx playwright install --with-deps chromium
                      BASE_URL=$(params.base-url) npx playwright test \
                        --reporter=html \
                        --output=playwright-results
      runAfter: [build-image]
      params:
        - name: base-url
          value: $(params.base-url)
      workspaces:
        - name: source
          workspace: source

    # ─────────────────────────────────────────────
    # 12. DAST: Wapiti スキャン
    # ─────────────────────────────────────────────
    - name: dast-wapiti
      taskRef:
        resolver: inline
        params:
          - name: source
            value: |
              apiVersion: tekton.dev/v1
              kind: Task
              metadata:
                name: wapiti-inline
              spec:
                params:
                  - name: target-url
                    type: string
                workspaces:
                  - name: source
                steps:
                  - name: wapiti-scan
                    image: cyberaz0r/wapiti:latest
                    workingDir: $(workspaces.source.path)
                    securityContext:
                      runAsNonRoot: true
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    script: |
                      #!/usr/bin/env bash
                      set -euo pipefail
                      mkdir -p test-results
                      wapiti \
                        -u $(params.target-url) \
                        --scope page \
                        -f json \
                        -o test-results/wapiti-report.json \
                        --flush-session \
                        --max-links-per-page 50 \
                        --max-scan-time 300
      runAfter: [playwright-e2e]
      params:
        - name: target-url
          value: $(params.base-url)
      workspaces:
        - name: source
          workspace: source
